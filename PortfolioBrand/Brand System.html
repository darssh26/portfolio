<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mostafa Ead — Brand System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    /* ── Brand tokens (light mode) ─────────────────────────── */
    --brand-50:  #EEF3FB;
    --brand-100: #DBE5F4;
    --brand-200: #B7CAE8;
    --brand-300: #7E9DD0;
    --brand-400: #4F75B5;
    --brand-500: #2B538F;  /* primary */
    --brand-600: #1F4276;
    --brand-700: #173458;
    --brand-800: #11253E;
    --brand-900: #0B1A2C;

    --neutral-0:   #FFFFFF;
    --neutral-25:  #FBFBFC;
    --neutral-50:  #F6F7F8;
    --neutral-100: #EEF0F2;
    --neutral-200: #E2E5E9;
    --neutral-300: #C9CED4;
    --neutral-400: #9AA1AB;
    --neutral-500: #6B7280;
    --neutral-600: #4A515B;
    --neutral-700: #2E343C;
    --neutral-800: #1B1F25;
    --neutral-900: #0F1217;

    --positive: #137A4B;        /* light-mode success */
    --positive-dark: #3DBE82;   /* dark-mode success */

    /* Semantic — light */
    --bg:        var(--neutral-0);
    --surface:   var(--neutral-50);
    --surface-2: var(--neutral-100);
    --border:    var(--neutral-200);
    --border-strong: var(--neutral-300);
    --text:      var(--neutral-900);
    --text-muted: var(--neutral-500);
    --text-soft: var(--neutral-600);
    --primary:   var(--brand-500);
    --primary-hover: var(--brand-600);
    --on-primary: #FFFFFF;
    --success:   var(--positive);

    --font-sans: "Inter Tight", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }

  [data-theme="dark"] {
    --bg:        #0B0D11;
    --surface:   #11141A;
    --surface-2: #171B22;
    --border:    #232830;
    --border-strong: #2F3540;
    --text:      #ECEEF1;
    --text-muted: #8A929D;
    --text-soft: #B6BCC5;
    --primary:   #6F9AD8;       /* lighter for dark-mode AA */
    --primary-hover: #87ABDE;
    --on-primary: #0B1A2C;
    --success:   var(--positive-dark);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    font-feature-settings: "ss01", "cv11";
    font-size: 16px;
    line-height: 1.55;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color .18s ease, color .18s ease;
  }
  ::selection { background: color-mix(in oklch, var(--primary) 28%, transparent); }

  /* ── Layout ─────────────────────────────────── */
  .page { max-width: 1100px; margin: 0 auto; padding: 56px 40px 120px; }

  .doc-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 32px; padding-bottom: 28px; border-bottom: 1px solid var(--border);
    margin-bottom: 56px;
  }
  .doc-head .eyebrow {
    font-family: var(--font-mono); font-size: 12px; letter-spacing: .04em;
    color: var(--text-muted); text-transform: uppercase;
  }
  .doc-head h1 {
    font-size: 34px; line-height: 1.15; letter-spacing: -0.02em;
    font-weight: 600; margin: 8px 0 6px;
  }
  .doc-head .sub { color: var(--text-soft); max-width: 56ch; }
  .doc-head .meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
    text-align: right; line-height: 1.7; white-space: nowrap;
  }

  section { margin-bottom: 72px; }
  section > h2 {
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--text-muted);
    margin: 0 0 20px;
    display: flex; align-items: center; gap: 12px;
  }
  section > h2::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }
  section > h3 {
    font-size: 22px; font-weight: 600; letter-spacing: -0.015em;
    margin: 0 0 12px;
  }
  p { margin: 0 0 14px; color: var(--text-soft); max-width: 68ch; }
  p strong { color: var(--text); font-weight: 600; }
  .lede { font-size: 18px; line-height: 1.55; color: var(--text); max-width: 64ch; }

  /* ── Generic blocks ─────────────────────────── */
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }

  .kv { display: grid; grid-template-columns: 160px 1fr; gap: 8px 24px; }
  .kv dt { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .kv dd { margin: 0; color: var(--text); font-size: 14px; }

  code, .mono { font-family: var(--font-mono); font-size: 13px; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px; border-radius: 999px;
    background: var(--surface-2); border: 1px solid var(--border);
    font-family: var(--font-mono); font-size: 11px; color: var(--text-soft);
  }

  /* ── Color swatches ─────────────────────────── */
  .swatch { display: flex; flex-direction: column; gap: 8px; }
  .swatch .chip-color {
    height: 76px; border-radius: 8px;
    border: 1px solid color-mix(in oklch, currentColor 8%, transparent);
    box-shadow: 0 1px 0 rgba(255,255,255,.04) inset;
  }
  .swatch .meta-row {
    display: flex; align-items: baseline; justify-content: space-between;
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
  }
  .swatch .name { color: var(--text); font-weight: 500; }

  .scale {
    display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px;
    margin-top: 8px;
  }
  .scale .step {
    aspect-ratio: 1 / 1.1; border-radius: 6px;
    display: flex; align-items: flex-end; padding: 6px;
    font-family: var(--font-mono); font-size: 10px;
    border: 1px solid color-mix(in oklch, currentColor 8%, transparent);
  }

  .contrast-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .contrast-card {
    border-radius: 10px; padding: 16px 18px;
    border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
    font-size: 14px;
  }
  .contrast-card .lbl {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: .06em;
    text-transform: uppercase; opacity: .65;
  }
  .contrast-card .ratio {
    font-family: var(--font-mono); font-size: 11px; opacity: .7;
  }
  .pill-pass {
    display: inline-block; padding: 1px 7px; border-radius: 999px;
    font-family: var(--font-mono); font-size: 10px;
    background: color-mix(in oklch, var(--success) 14%, transparent);
    color: var(--success);
    border: 1px solid color-mix(in oklch, var(--success) 30%, transparent);
  }

  /* ── Type specimen ─────────────────────────── */
  .type-spec { display: flex; flex-direction: column; gap: 18px; }
  .type-row {
    display: grid; grid-template-columns: 110px 1fr; gap: 24px; align-items: baseline;
    padding: 14px 0; border-top: 1px solid var(--border);
  }
  .type-row:first-child { border-top: 0; padding-top: 0; }
  .type-row .meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
    line-height: 1.5;
  }
  .t-h1 { font-size: 3rem;   line-height: 1.05; letter-spacing: -0.025em; font-weight: 600; }
  .t-h2 { font-size: 2rem;   line-height: 1.15; letter-spacing: -0.02em;  font-weight: 600; }
  .t-h3 { font-size: 1.375rem; line-height: 1.3; letter-spacing: -0.01em; font-weight: 600; }
  .t-body { font-size: 1rem;   line-height: 1.6;  font-weight: 400; }
  .t-small { font-size: 0.8125rem; line-height: 1.5; font-weight: 400; color: var(--text-muted); }

  /* ── Voice do/don't ─────────────────────────── */
  .vt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .vt {
    border-radius: 10px; padding: 18px 20px;
    border: 1px solid var(--border); background: var(--surface);
  }
  .vt h4 {
    margin: 0 0 12px; font-size: 12px; font-family: var(--font-mono);
    letter-spacing: .06em; text-transform: uppercase; font-weight: 500;
  }
  .vt.do h4 { color: var(--success); }
  .vt.dont h4 { color: var(--text-muted); }
  .vt ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 14px; }
  .vt li { font-size: 14px; color: var(--text); }
  .vt li small {
    display: block; color: var(--text-muted); font-size: 12.5px;
    margin-top: 2px; line-height: 1.5;
  }

  /* ── Wordmark display ───────────────────────── */
  .wm-stage {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 56px 40px;
    display: flex; align-items: center; justify-content: center;
    min-height: 220px;
  }
  .wm-lockup {
    display: flex; align-items: center; gap: 14px;
    color: var(--text);
  }
  .wm-mark {
    width: 36px; height: 36px; border-radius: 7px;
    background: var(--primary);
    color: var(--on-primary);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .wm-text {
    font-family: var(--font-sans);
    font-size: 22px; font-weight: 600;
    letter-spacing: -0.015em;
  }
  .wm-text .light { color: var(--text-muted); font-weight: 400; }

  .favicon-row { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
  .fav-tile { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .fav-tile .lbl {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
  }
  .fav-tile .frame {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Hero reference ─────────────────────────── */
  .hero-frame {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg);
  }
  .hero-frame .browser {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .hero-frame .browser .dots { display: flex; gap: 6px; }
  .hero-frame .browser .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border-strong); }
  .hero-frame .browser .url {
    flex: 1; text-align: center; font-family: var(--font-mono); font-size: 11px;
    color: var(--text-muted);
  }

  .hero {
    padding: 72px 64px 80px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 360px);
    gap: 64px;
    align-items: start;
  }
  .hero-nav {
    grid-column: 1 / -1;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 56px;
    font-size: 14px;
  }
  .hero-nav .links { display: flex; gap: 28px; color: var(--text-soft); }
  .hero-nav .links a { color: inherit; text-decoration: none; }
  .hero-nav .links a:hover { color: var(--text); }

  .hero h1.hero-title {
    font-size: 56px; line-height: 1.05; letter-spacing: -0.03em;
    font-weight: 600; margin: 0 0 20px; max-width: 14ch;
  }
  .hero h1.hero-title em {
    font-style: normal; color: var(--primary);
  }
  .hero .hero-sub {
    font-size: 18px; line-height: 1.55; color: var(--text-soft);
    max-width: 50ch; margin: 0 0 32px;
  }
  .hero .hero-cta { display: flex; gap: 12px; align-items: center; }
  .btn-primary {
    background: var(--primary); color: var(--on-primary);
    padding: 10px 16px; border-radius: 8px; border: 0;
    font: 500 14px/1 var(--font-sans);
    letter-spacing: -0.005em;
    cursor: default;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-ghost {
    background: transparent; color: var(--text);
    padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border-strong);
    font: 500 14px/1 var(--font-sans);
    cursor: default; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .hero .hero-meta {
    font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
    display: flex; flex-direction: column; gap: 12px;
    border-left: 1px solid var(--border); padding-left: 24px;
  }
  .hero .hero-meta .row {
    display: grid; grid-template-columns: 80px 1fr; gap: 12px;
  }
  .hero .hero-meta .key { color: var(--text-muted); }
  .hero .hero-meta .val { color: var(--text); }
  .status-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--success); margin-right: 6px;
    box-shadow: 0 0 0 3px color-mix(in oklch, var(--success) 18%, transparent);
  }

  /* ── Code blocks ───────────────────────────── */
  pre.code {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin: 0;
    font-family: var(--font-mono);
    font-size: 12.5px;
    line-height: 1.65;
    color: var(--text);
    overflow-x: auto;
    white-space: pre;
  }
  pre.code .c-key { color: var(--primary); }
  pre.code .c-str { color: var(--success); }
  pre.code .c-com { color: var(--text-muted); }

  /* ── Footer ────────────────────────────────── */
  footer.doc-foot {
    margin-top: 80px; padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between;
    font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
  }
</style>
</head>
<body>
<div id="app"></div>

<!-- TWEAK_DEFAULTS lives here for the host to persist -->
<script>
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "dark": false
  }/*EDITMODE-END*/;
</script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand-spec.jsx"></script>
</body>
</html>
